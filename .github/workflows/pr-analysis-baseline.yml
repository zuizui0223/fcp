name: PR research macroecology analysis

on:
  pull_request:
    paths:
      - "analysis_evidence_baseline.py"
      - "analysis_macroecology.py"
      - "build_gbif_geography_covariates.py"
      - "docs/analysis_method.md"
      - "docs/current_data_research_results.md"
      - "data/species_macroecology_covariates*.csv"
      - ".github/workflows/pr-analysis-baseline.yml"

permissions:
  contents: read
  actions: read

jobs:
  research-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Download resolved acquisition data from PR1
        uses: actions/download-artifact@v4
        with:
          name: pr-targeted-followup-results
          path: pr1_resolved
          github-token: ${{ github.token }}
          repository: zuizui0223/fcp
          run-id: 29637383042

      - name: Validate transferred PR1 inputs
        run: |
          set -euo pipefail
          test -s pr1_resolved/global_flower_colour_species_ranked_resolved.csv
          test -s pr1_resolved/global_flower_colour_review_queue_resolved.csv
          test -s pr1_resolved/global_flower_colour_review_queue_resolved_qc.json
          python - <<'PY'
          import csv, json
          from pathlib import Path
          species=sum(1 for _ in csv.DictReader(open('pr1_resolved/global_flower_colour_species_ranked_resolved.csv',encoding='utf-8')))
          review=sum(1 for _ in csv.DictReader(open('pr1_resolved/global_flower_colour_review_queue_resolved.csv',encoding='utf-8')))
          qc=json.loads(Path('pr1_resolved/global_flower_colour_review_queue_resolved_qc.json').read_text())
          assert species == qc['input_candidate_species'] == 664
          assert review == qc['review_queue_rows'] == 111
          print({'species':species,'review':review,'deferred':qc['deferred_rows']})
          PY

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install analysis dependencies
        run: python -m pip install --disable-pip-version-check numpy pandas statsmodels

      - name: Build GBIF geography covariates
        run: |
          set -euo pipefail
          python build_gbif_geography_covariates.py \
            --species pr1_resolved/global_flower_colour_species_ranked_resolved.csv \
            --out analysis_outputs/covariates/species_gbif_geography_covariates.csv \
            --qc-out analysis_outputs/covariates/species_gbif_geography_covariates_qc.json \
            --limit 300 --timeout 45 --retries 4 --request-delay 0.20
          cat analysis_outputs/covariates/species_gbif_geography_covariates_qc.json

      - name: Run evidence diagnostics on resolved PR1 data
        run: |
          set -euo pipefail
          python analysis_evidence_baseline.py \
            --species pr1_resolved/global_flower_colour_species_ranked_resolved.csv \
            --outdir analysis_outputs/evidence

      - name: Run research analysis on resolved PR1 data
        run: |
          set -euo pipefail
          python analysis_macroecology.py \
            --species pr1_resolved/global_flower_colour_species_ranked_resolved.csv \
            --review pr1_resolved/global_flower_colour_review_queue_resolved.csv \
            --covariates data/species_macroecology_covariates.csv \
            --geography-covariates analysis_outputs/covariates/species_gbif_geography_covariates.csv \
            --outdir analysis_outputs/research
          cp pr1_resolved/global_flower_colour_review_queue_resolved_qc.json analysis_outputs/research/input_review_queue_qc.json
          cp pr1_resolved/targeted_exact_species_rescue_qc.json analysis_outputs/research/input_exact_rescue_qc.json
          cat analysis_outputs/research/research_analysis_manifest.json

      - name: Validate research outputs
        run: |
          set -euo pipefail
          test -s analysis_outputs/covariates/species_gbif_geography_covariates.csv
          test -s analysis_outputs/covariates/species_gbif_geography_covariates_qc.json
          test -s analysis_outputs/research/research_analysis_manifest.json
          test -s analysis_outputs/research/discovery_effort_nonlinear_model.csv
          test -s analysis_outputs/research/effort_standardized_predictions.csv
          test -s analysis_outputs/research/family_effort_adjusted_signal.csv
          test -s analysis_outputs/research/leave_one_family_out.csv
          test -s analysis_outputs/research/geography_macroecology_model.csv
          test -s analysis_outputs/research/geography_macroecology_strict_model.csv
          test -s analysis_outputs/research/geography_covariate_coverage.csv
          test -s analysis_outputs/research/geography_range_robustness.csv
          test -s analysis_outputs/research/geography_range_leave_one_family_out.csv
          python - <<'PY'
          import json, math
          from pathlib import Path
          manifest=json.loads(Path('analysis_outputs/research/research_analysis_manifest.json').read_text())
          qc=json.loads(Path('analysis_outputs/covariates/species_gbif_geography_covariates_qc.json').read_text())
          effort=manifest['effort_model']; geography=manifest['geography_model']
          assert effort['n_species'] == 664
          assert effort['validated_cases'] == 111
          assert 0 <= effort['strict_cases'] <= effort['validated_cases']
          assert qc['species_requested'] == qc['species_completed'] == 664
          assert qc['complete'] is True
          assert qc['complete_coordinate_species'] >= 100
          assert geography['status'] == 'complete'
          assert geography['matched_species'] >= 100
          assert geography['robustness_specifications'] >= 3
          assert 0 <= geography['negative_range_estimate_fraction'] <= 1
          assert 0 <= geography['loo_negative_fraction'] <= 1
          for key in ('linear_aic','quadratic_aic','delta_aic_linear_minus_quadratic','strict_quadratic_p'):
              assert math.isfinite(float(effort[key])), key
          for key in ('aic','range_odds_ratio','range_p_value','strict_range_odds_ratio','strict_range_p_value'):
              assert math.isfinite(float(geography[key])), key
          print(json.dumps({'effort':effort,'geography':geography,'gbif_qc':qc}, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: research-macroecology-analysis-resolved-pr1
          path: analysis_outputs/
          if-no-files-found: error
          retention-days: 14
