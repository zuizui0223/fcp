name: PR targeted follow-up acquisition

on:
  pull_request:
    paths:
      - "targeted_deferred_followup.py"
      - "targeted_pigment_followup.py"
      - "targeted_ecology_followup.py"
      - ".github/workflows/pr-targeted-followup.yml"

permissions:
  contents: read
  actions: read

jobs:
  targeted-followup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate committed inputs
        shell: bash
        run: |
          set -euo pipefail
          test -s data/global_flower_colour_deferred.csv
          test -s data/global_flower_colour_species_ranked.csv
          echo "Deferred rows: $(( $(wc -l < data/global_flower_colour_deferred.csv) - 1 ))"
          echo "Species rows: $(( $(wc -l < data/global_flower_colour_species_ranked.csv) - 1 ))"

      - name: Run resilient targeted acquisition
        shell: bash
        run: |
          set -euo pipefail
          python targeted_deferred_followup.py \
            --deferred data/global_flower_colour_deferred.csv \
            --species data/global_flower_colour_species_ranked.csv \
            --works-out data/targeted_followup_works.csv \
            --qc-out data/targeted_followup_qc.json \
            --max-targets 80 \
            --per-page 25 \
            --timeout 30 \
            --retries 3 \
            --api-key-env OPENALEX_API_KEY

      - name: Run complementary pigment acquisition
        shell: bash
        run: |
          set -euo pipefail
          python targeted_pigment_followup.py \
            --deferred data/global_flower_colour_deferred.csv \
            --first-pass data/targeted_followup_works.csv \
            --out data/targeted_pigment_followup_works.csv \
            --qc-out data/targeted_pigment_followup_qc.json \
            --max-targets 80 \
            --per-page 100 \
            --timeout 30 \
            --retries 3 \
            --api-key-env OPENALEX_API_KEY

      - name: Run ecological polymorphism acquisition
        shell: bash
        run: |
          set -euo pipefail
          python targeted_ecology_followup.py \
            --deferred data/global_flower_colour_deferred.csv \
            --prior data/targeted_followup_works.csv \
            --prior data/targeted_pigment_followup_works.csv \
            --out data/targeted_ecology_followup_works.csv \
            --qc-out data/targeted_ecology_followup_qc.json \
            --max-targets 80 \
            --per-page 100 \
            --timeout 30 \
            --retries 3 \
            --api-key-env OPENALEX_API_KEY

      - name: Report acquisition results
        shell: bash
        run: |
          set -euo pipefail
          cat data/targeted_followup_qc.json
          cat data/targeted_pigment_followup_qc.json
          cat data/targeted_ecology_followup_qc.json
          python - <<'PY'
          import csv, json
          from pathlib import Path
          paths=['data/targeted_followup_works.csv','data/targeted_pigment_followup_works.csv','data/targeted_ecology_followup_works.csv']
          qcs=[json.loads(Path(p).read_text()) for p in ['data/targeted_followup_qc.json','data/targeted_pigment_followup_qc.json','data/targeted_ecology_followup_qc.json']]
          names=set(); works=set()
          for path in paths:
              with open(path,encoding='utf-8') as f:
                  for r in csv.DictReader(f):
                      names.add(r['canonical_name']); works.add((r['canonical_name'],r['openalex_id']))
          print(json.dumps({'combined_species_with_evidence':len(names),'combined_unique_works':len(works),'requests_used':sum(q['requests_used'] for q in qcs),'failed_requests':sum(q.get('failed_batches',q.get('failed_requests',0)) for q in qcs)}))
          PY

      - name: Upload targeted acquisition outputs
        uses: actions/upload-artifact@v4
        with:
          name: pr-targeted-followup-results
          path: |
            data/targeted_followup_works.csv
            data/targeted_followup_qc.json
            data/targeted_pigment_followup_works.csv
            data/targeted_pigment_followup_qc.json
            data/targeted_ecology_followup_works.csv
            data/targeted_ecology_followup_qc.json
            data/global_flower_colour_species_ranked.csv
          if-no-files-found: error
          retention-days: 14
