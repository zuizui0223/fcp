name: PR targeted follow-up acquisition

on:
  pull_request:
    paths:
      - "targeted_deferred_followup.py"
      - "targeted_pigment_followup.py"
      - "targeted_ecology_followup.py"
      - "targeted_classic_variation_followup.py"
      - "merge_followup_evidence.py"
      - "build_evidence_review_queue.py"
      - ".github/workflows/pr-targeted-followup.yml"

permissions:
  contents: read
  actions: read

jobs:
  targeted-followup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate and preserve run1 inputs
        shell: bash
        run: |
          set -euo pipefail
          test -s data/global_flower_colour_deferred.csv
          test -s data/global_flower_colour_species_ranked.csv
          cp data/global_flower_colour_species_ranked.csv "$RUNNER_TEMP/species_ranked_run1.csv"
          echo "Deferred rows before follow-up: $(( $(wc -l < data/global_flower_colour_deferred.csv) - 1 ))"
          echo "Species rows: $(( $(wc -l < data/global_flower_colour_species_ranked.csv) - 1 ))"

      - name: Pass 1 broad flower-colour retrieval
        shell: bash
        run: |
          set -euo pipefail
          python targeted_deferred_followup.py \
            --deferred data/global_flower_colour_deferred.csv \
            --species data/global_flower_colour_species_ranked.csv \
            --works-out data/targeted_followup_works.csv \
            --qc-out data/targeted_followup_qc.json \
            --max-targets 160 --per-page 50 --timeout 30 --retries 3 \
            --api-key-env OPENALEX_API_KEY

      - name: Pass 2 pigment and white-flower retrieval
        shell: bash
        run: |
          set -euo pipefail
          python targeted_pigment_followup.py \
            --deferred data/global_flower_colour_deferred.csv \
            --first-pass data/targeted_followup_works.csv \
            --out data/targeted_pigment_followup_works.csv \
            --qc-out data/targeted_pigment_followup_qc.json \
            --max-targets 160 --per-page 100 --timeout 30 --retries 3 \
            --api-key-env OPENALEX_API_KEY

      - name: Pass 3 ecological polymorphism retrieval
        shell: bash
        run: |
          set -euo pipefail
          python targeted_ecology_followup.py \
            --deferred data/global_flower_colour_deferred.csv \
            --prior data/targeted_followup_works.csv \
            --prior data/targeted_pigment_followup_works.csv \
            --out data/targeted_ecology_followup_works.csv \
            --qc-out data/targeted_ecology_followup_qc.json \
            --max-targets 160 --per-page 100 --timeout 30 --retries 3 \
            --api-key-env OPENALEX_API_KEY

      - name: Pass 4 classic variation retrieval
        shell: bash
        run: |
          set -euo pipefail
          python targeted_classic_variation_followup.py \
            --deferred data/global_flower_colour_deferred.csv \
            --prior data/targeted_followup_works.csv \
            --prior data/targeted_pigment_followup_works.csv \
            --prior data/targeted_ecology_followup_works.csv \
            --out data/targeted_classic_variation_followup_works.csv \
            --qc-out data/targeted_classic_variation_followup_qc.json \
            --max-targets 200 --per-page 100 --timeout 30 --retries 3 \
            --api-key-env OPENALEX_API_KEY

      - name: Merge evidence and rebuild review queue
        shell: bash
        run: |
          set -euo pipefail
          python merge_followup_evidence.py \
            --species "$RUNNER_TEMP/species_ranked_run1.csv" \
            --followup data/targeted_followup_works.csv \
            --followup data/targeted_pigment_followup_works.csv \
            --followup data/targeted_ecology_followup_works.csv \
            --followup data/targeted_classic_variation_followup_works.csv \
            --out data/global_flower_colour_species_ranked_resolved.csv \
            --qc-out data/followup_merge_qc.json
          python build_evidence_review_queue.py \
            --species data/global_flower_colour_species_ranked_resolved.csv \
            --out data/global_flower_colour_review_queue_resolved.csv \
            --deferred-out data/global_flower_colour_deferred_resolved.csv \
            --qc-out data/global_flower_colour_review_queue_resolved_qc.json \
            --max-review 664

      - name: Report deferred resolution
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv, json
          from pathlib import Path
          work_paths=[
            'data/targeted_followup_works.csv',
            'data/targeted_pigment_followup_works.csv',
            'data/targeted_ecology_followup_works.csv',
            'data/targeted_classic_variation_followup_works.csv',
          ]
          names=set(); works=set()
          for path in work_paths:
            with open(path,encoding='utf-8') as f:
              for r in csv.DictReader(f):
                names.add(r['canonical_name']); works.add((r['canonical_name'],r['openalex_id']))
          before=sum(1 for _ in csv.DictReader(open('data/global_flower_colour_deferred.csv',encoding='utf-8')))
          after=sum(1 for _ in csv.DictReader(open('data/global_flower_colour_deferred_resolved.csv',encoding='utf-8')))
          review=sum(1 for _ in csv.DictReader(open('data/global_flower_colour_review_queue_resolved.csv',encoding='utf-8')))
          merge=json.loads(Path('data/followup_merge_qc.json').read_text())
          print(json.dumps({
            'followup_species_with_evidence':len(names),
            'followup_unique_works':len(works),
            'deferred_before':before,
            'deferred_after':after,
            'deferred_resolved':before-after,
            'resolved_review_queue_rows':review,
            'merged_rows':merge['merged_rows'],
          }))
          PY

      - name: Upload acquisition and resolved outputs
        uses: actions/upload-artifact@v4
        with:
          name: pr-targeted-followup-results
          path: |
            data/targeted_*followup*.csv
            data/targeted_*followup*.json
            data/followup_merge_qc.json
            data/global_flower_colour_species_ranked_resolved.csv
            data/global_flower_colour_review_queue_resolved.csv
            data/global_flower_colour_deferred_resolved.csv
            data/global_flower_colour_review_queue_resolved_qc.json
          if-no-files-found: error
          retention-days: 14
