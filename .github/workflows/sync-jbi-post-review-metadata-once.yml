name: Sync JBI post-review metadata once

on:
  pull_request:
    paths:
      - "tools/sync_jbi_post_review_metadata.py"
      - ".github/workflows/sync-jbi-post-review-metadata-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jbi-final-editorial-revision
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Synchronize counts, review state and validator guards
        run: |
          python tools/sync_jbi_post_review_metadata.py
          python validate_jbi_submission_package.py
          python validate_jbi_classification_transparency.py
          grep -q "Structured abstract: \*\*245 words\*\*" docs/jbi_title_page_template.md
          grep -q "Introduction–Discussion contains 4,537 words" docs/jbi_editorial_submission_check.md
          grep -q "S18/S19 classification-review packet" docs/jbi_submission_completion_checklist.md
          grep -q "Repository-supported state" docs/jbi_author_confirmation_form.md

      - name: Commit synchronized submission metadata
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/jbi_title_page_template.md \
            docs/jbi_editorial_submission_check.md \
            docs/jbi_submission_completion_checklist.md \
            docs/jbi_author_confirmation_form.md \
            validate_jbi_submission_package.py
          if git diff --cached --quiet; then
            echo "No post-review metadata changes"
            exit 0
          fi
          git commit -m "Synchronize JBI review state and word counts"
          git push origin HEAD:agent/jbi-final-editorial-revision
