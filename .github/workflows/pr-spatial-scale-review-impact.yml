name: PR spatial-scale review impact

on:
  pull_request:
    paths:
      - "analysis_spatial_scale_review_impact.py"
      - "analysis_evidence_spatial_scale_enriched.py"
      - "enrich_spatial_scale_evidence.py"
      - ".github/workflows/pr-spatial-scale-review-impact.yml"
      - "data/resolved_inputs/**"

permissions:
  contents: read

jobs:
  review-impact:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check numpy pandas statsmodels
      - name: Enrich evidence
        run: |
          mkdir -p analysis_outputs/evidence_scale
          python enrich_spatial_scale_evidence.py \
            --review data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --out analysis_outputs/evidence_scale/enriched_openalex_works.csv \
            --species-summary analysis_outputs/evidence_scale/enriched_species_summary.csv \
            --qc-out analysis_outputs/evidence_scale/enriched_openalex_qc.json \
            --per-page 50 --timeout 40 --retries 4 --request-delay 0.25
      - name: Build GBIF covariates
        run: |
          python build_gbif_geography_covariates.py \
            --species data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --out analysis_outputs/evidence_scale/confirmed_species_gbif_geography.csv \
            --qc-out analysis_outputs/evidence_scale/confirmed_species_gbif_geography_qc.json \
            --limit 300 --timeout 45 --retries 4 --request-delay 0.20
      - name: Build integrated classification
        run: |
          python analysis_evidence_spatial_scale_enriched.py \
            --review data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --works analysis_outputs/evidence_scale/enriched_openalex_works.csv \
            --geography analysis_outputs/evidence_scale/confirmed_species_gbif_geography.csv \
            --outdir analysis_outputs/evidence_scale_enriched
      - name: Rank unresolved cases by impact
        run: |
          python analysis_spatial_scale_review_impact.py \
            --classification analysis_outputs/evidence_scale_enriched/high_confidence_enriched_classification.csv \
            --geography analysis_outputs/evidence_scale/confirmed_species_gbif_geography.csv \
            --outdir analysis_outputs/review_impact
          cat analysis_outputs/review_impact/spatial_scale_review_impact_manifest.json
      - name: Validate outputs
        run: |
          test -s analysis_outputs/review_impact/spatial_scale_review_impact_priority.csv
          test -s analysis_outputs/review_impact/top15_decisive_manual_review.csv
          test -s analysis_outputs/review_impact/spatial_scale_review_impact_manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: spatial-scale-review-impact
          path: analysis_outputs/review_impact/
          if-no-files-found: error
          retention-days: 14
