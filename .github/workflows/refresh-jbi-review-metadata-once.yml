name: Refresh JBI review metadata once

on:
  pull_request:
    paths:
      - "update_jbi_review_supporting_index.py"
      - "docs/jbi_classification_review_protocol.md"
      - "docs/jbi_classification_rule_audit.md"
      - ".github/workflows/refresh-jbi-review-metadata-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jbi-final-editorial-revision
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh S18-S19 metadata and validate idempotence
        run: |
          python update_jbi_review_supporting_index.py
          cp docs/jbi_supporting_information_index.md /tmp/index-first.md
          cp docs/jbi_manuscript_editorial_revision.md /tmp/manuscript-first.md
          cp validate_jbi_submission_package.py /tmp/validator-first.py
          python update_jbi_review_supporting_index.py
          cmp /tmp/index-first.md docs/jbi_supporting_information_index.md
          cmp /tmp/manuscript-first.md docs/jbi_manuscript_editorial_revision.md
          cmp /tmp/validator-first.py validate_jbi_submission_package.py
          grep -q "evaluate_jbi_completed_classification_review.py" docs/jbi_classification_review_protocol.md
          test "$(grep -c 'Tables S18–S19 are generated' docs/jbi_supporting_information_index.md)" -eq 1

      - name: Commit refreshed review metadata
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/jbi_supporting_information_index.md \
            docs/jbi_manuscript_editorial_revision.md \
            validate_jbi_submission_package.py
          if git diff --cached --quiet; then
            echo "No review metadata changes"
            exit 0
          fi
          git commit -m "Refresh blinded-review Supporting Information metadata"
          git push origin HEAD:agent/jbi-final-editorial-revision
