name: PR evidence spatial-scale review priority

on:
  pull_request:
    paths:
      - "analysis_evidence_spatial_scale.py"
      - "prioritize_evidence_spatial_review.py"
      - ".github/workflows/pr-evidence-spatial-review-priority.yml"
      - "data/resolved_inputs/**"

permissions:
  contents: read

jobs:
  review-priority:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check numpy pandas statsmodels
      - name: Build GBIF covariates
        run: |
          set -euo pipefail
          mkdir -p analysis_outputs/evidence_scale
          python build_gbif_geography_covariates.py \
            --species data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --out analysis_outputs/evidence_scale/confirmed_species_gbif_geography.csv \
            --qc-out analysis_outputs/evidence_scale/confirmed_species_gbif_geography_qc.json \
            --limit 300 --timeout 45 --retries 4 --request-delay 0.20
      - name: Classify evidence scale
        run: |
          set -euo pipefail
          python analysis_evidence_spatial_scale.py \
            --review data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --geography analysis_outputs/evidence_scale/confirmed_species_gbif_geography.csv \
            --outdir analysis_outputs/evidence_scale
      - name: Prioritize manual review
        run: |
          set -euo pipefail
          python prioritize_evidence_spatial_review.py \
            --screening analysis_outputs/evidence_scale/evidence_spatial_scale_screening.csv \
            --outdir analysis_outputs/evidence_scale_review
          cat analysis_outputs/evidence_scale_review/evidence_spatial_scale_review_manifest.json
      - name: Validate outputs
        run: |
          set -euo pipefail
          test -s analysis_outputs/evidence_scale_review/evidence_spatial_scale_prioritized_review.csv
          test -s analysis_outputs/evidence_scale_review/evidence_spatial_scale_top25_review.csv
          test -s analysis_outputs/evidence_scale_review/evidence_spatial_scale_review_manifest.json
          python - <<'PY'
          import json
          from pathlib import Path
          x=json.loads(Path('analysis_outputs/evidence_scale_review/evidence_spatial_scale_review_manifest.json').read_text())
          assert x['manual_review_rows']==73
          assert x['mixed_rows']==3
          assert x['unclear_rows']==70
          assert x['semantic_guard'].startswith('ranking only')
          print(json.dumps(x,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-spatial-scale-review-priority
          path: |
            analysis_outputs/evidence_scale/
            analysis_outputs/evidence_scale_review/
          if-no-files-found: error
          retention-days: 14
