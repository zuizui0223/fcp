name: Apply JBI dated phylogeny manuscript patch

on:
  pull_request:
    paths:
      - "tools/apply_jbi_dated_phylogeny_manuscript_patch.py"
      - "docs/supporting/jbi_table_s16_dated_phylogeny_sensitivity_summary.csv"
      - ".github/workflows/apply-jbi-dated-phylogeny-manuscript.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jbi-final-editorial-revision
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install patch dependencies
        run: python -m pip install --disable-pip-version-check pandas

      - name: Apply and validate manuscript patch
        run: |
          python tools/apply_jbi_dated_phylogeny_manuscript_patch.py
          grep -q "Dated-megaphylogeny sensitivity" docs/jbi_manuscript_editorial_revision.md
          grep -q "0.366–0.369" docs/jbi_manuscript_editorial_revision.md
          grep -q "Tables S16–S17" docs/jbi_manuscript_editorial_revision.md
          grep -q "Jin, Y., & Qian, H. (2022)" docs/jbi_manuscript_editorial_revision.md
          grep -q "species-specific molecular phylogeny would refine" docs/jbi_manuscript_editorial_revision.md

      - name: Commit manuscript integration
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/jbi_manuscript_editorial_revision.md
          if git diff --cached --quiet; then
            echo "No manuscript changes to commit"
            exit 0
          fi
          git commit -m "Integrate dated phylogeny sensitivity into JBI manuscript"
          git push origin HEAD:agent/jbi-final-editorial-revision
