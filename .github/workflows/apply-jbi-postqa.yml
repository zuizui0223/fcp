name: Apply JBI post-integration QA

on:
  pull_request:
    paths:
      - "tools/apply_jbi_postqa.py"
      - ".github/workflows/apply-jbi-postqa.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  postqa:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jbi-final-editorial-revision
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply QA patch
        run: python tools/apply_jbi_postqa.py
      - name: Validate QA state
        run: |
          set -euo pipefail
          grep -q "dated species phylogeny" docs/jbi_manuscript_editorial_revision.md
          grep -q "OR = 0.472" docs/jbi_editorial_submission_check.md
          ! grep -q "phylogenetic correction has not been performed" docs/jbi_manuscript_editorial_revision.md
          ! grep -q "Phylogenetic model | ✗ Missing" docs/jbi_editorial_submission_check.md
      - name: Commit QA changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/jbi_manuscript_editorial_revision.md docs/jbi_editorial_submission_check.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Complete JBI round-three editorial QA"
          git push origin HEAD:agent/jbi-final-editorial-revision
