name: PR evidence spatial-scale classification

on:
  pull_request:
    paths:
      - "analysis_evidence_spatial_scale.py"
      - ".github/workflows/pr-evidence-spatial-scale.yml"
      - "data/resolved_inputs/**"

permissions:
  contents: read

jobs:
  evidence-scale:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check numpy pandas statsmodels
      - name: Validate frozen inputs
        run: |
          set -euo pipefail
          test -s data/resolved_inputs/global_flower_colour_review_queue_resolved.csv
      - name: Build GBIF covariates for confirmed species
        run: |
          set -euo pipefail
          mkdir -p analysis_outputs/evidence_scale
          python build_gbif_geography_covariates.py \
            --species data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --out analysis_outputs/evidence_scale/confirmed_species_gbif_geography.csv \
            --qc-out analysis_outputs/evidence_scale/confirmed_species_gbif_geography_qc.json \
            --limit 300 --timeout 45 --retries 4 --request-delay 0.20
      - name: Classify ecological evidence scale
        run: |
          set -euo pipefail
          python analysis_evidence_spatial_scale.py \
            --review data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --geography analysis_outputs/evidence_scale/confirmed_species_gbif_geography.csv \
            --outdir analysis_outputs/evidence_scale
          cat analysis_outputs/evidence_scale/evidence_spatial_scale_manifest.json
      - name: Validate outputs
        run: |
          set -euo pipefail
          test -s analysis_outputs/evidence_scale/evidence_spatial_scale_screening.csv
          test -s analysis_outputs/evidence_scale/evidence_spatial_scale_manual_review.csv
          test -s analysis_outputs/evidence_scale/evidence_spatial_scale_manifest.json
          python - <<'PY'
          import json
          from pathlib import Path
          x=json.loads(Path('analysis_outputs/evidence_scale/evidence_spatial_scale_manifest.json').read_text())
          assert x['n_confirmed']==111
          assert sum(x['scale_counts'].values())==111
          assert x['semantic_guard'].startswith('automated spatial-scale labels')
          print(json.dumps(x,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-spatial-scale-analysis
          path: analysis_outputs/evidence_scale/
          if-no-files-found: error
          retention-days: 14
