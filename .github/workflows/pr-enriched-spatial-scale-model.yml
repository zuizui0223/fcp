name: PR high-confidence enriched spatial-scale model

on:
  pull_request:
    paths:
      - "analysis_enriched_spatial_scale.py"
      - "enrich_spatial_scale_evidence.py"
      - "build_enrichment_classification_audit.py"
      - ".github/workflows/pr-enriched-spatial-scale-model.yml"
      - "data/resolved_inputs/**"

permissions:
  contents: read

jobs:
  enriched-scale:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check numpy pandas statsmodels
      - name: Enrich ambiguous evidence
        run: |
          set -euo pipefail
          mkdir -p analysis_outputs/evidence_scale analysis_outputs/evidence_scale_enriched
          python enrich_spatial_scale_evidence.py \
            --review data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --out analysis_outputs/evidence_scale/enriched_openalex_works.csv \
            --species-summary analysis_outputs/evidence_scale/enriched_species_summary.csv \
            --qc-out analysis_outputs/evidence_scale/enriched_openalex_qc.json \
            --per-page 50 --timeout 40 --retries 4 --request-delay 0.25
      - name: Build GBIF covariates
        run: |
          python build_gbif_geography_covariates.py \
            --species data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --out analysis_outputs/evidence_scale_enriched/confirmed_species_gbif_geography.csv \
            --qc-out analysis_outputs/evidence_scale_enriched/confirmed_species_gbif_geography_qc.json \
            --limit 300 --timeout 45 --retries 4 --request-delay 0.20
      - name: Run high-confidence model
        run: |
          python analysis_enriched_spatial_scale.py \
            --review data/resolved_inputs/global_flower_colour_review_queue_resolved.csv \
            --works analysis_outputs/evidence_scale/enriched_openalex_works.csv \
            --geography analysis_outputs/evidence_scale_enriched/confirmed_species_gbif_geography.csv \
            --outdir analysis_outputs/evidence_scale_enriched
          cat analysis_outputs/evidence_scale_enriched/high_confidence_enriched_manifest.json
      - name: Build source-level classification audit
        run: |
          python build_enrichment_classification_audit.py \
            --classification analysis_outputs/evidence_scale_enriched/high_confidence_enriched_classification.csv \
            --works analysis_outputs/evidence_scale/enriched_openalex_works.csv \
            --out analysis_outputs/evidence_scale_enriched/enrichment_classification_source_audit.csv \
            --manifest analysis_outputs/evidence_scale_enriched/enrichment_classification_source_audit_manifest.json
          cat analysis_outputs/evidence_scale_enriched/enrichment_classification_source_audit_manifest.json
      - name: Validate outputs
        run: |
          set -euo pipefail
          test -s analysis_outputs/evidence_scale_enriched/high_confidence_enriched_classification.csv
          test -s analysis_outputs/evidence_scale_enriched/high_confidence_enriched_manifest.json
          test -s analysis_outputs/evidence_scale_enriched/enrichment_classification_source_audit.csv
          test -s analysis_outputs/evidence_scale_enriched/enrichment_classification_source_audit_manifest.json
          python - <<'PY'
          import json
          import pandas as pd
          from pathlib import Path
          x=json.loads(Path('analysis_outputs/evidence_scale_enriched/high_confidence_enriched_manifest.json').read_text())
          a=json.loads(Path('analysis_outputs/evidence_scale_enriched/enrichment_classification_source_audit_manifest.json').read_text())
          audit=pd.read_csv('analysis_outputs/evidence_scale_enriched/enrichment_classification_source_audit.csv')
          assert x['n_confirmed']==111
          assert x['eligible_natural_direct_works']>0
          guard=x['semantic_guard']
          assert 'supplements rather than replaces baseline evidence' in guard
          assert 'direct colour evidence' in guard
          assert 'no artificial signal' in guard
          assert 'score >=20' in guard
          assert a['target_species']>0
          assert a['audit_rows']>=a['target_species']
          assert a['species_with_matching_source']>0
          assert a['species_requiring_manual_source_review']==a['target_species']-a['species_with_matching_source']
          assert audit['canonical_name'].nunique()==a['target_species']
          assert set(audit['audit_status']) <= {'matching_source_present','manual_source_review_required'}
          assert a['among_population_targets']>=1
          assert a['climate_priority_available'] is False
          assert a['semantic_guard'].startswith('This table exposes retained source-level evidence')
          print(json.dumps({'model':x,'source_audit':a},indent=2))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: high-confidence-enriched-spatial-scale
          path: |
            analysis_outputs/evidence_scale_enriched/
            analysis_outputs/evidence_scale/enriched_openalex_works.csv
          if-no-files-found: error
          retention-days: 14
