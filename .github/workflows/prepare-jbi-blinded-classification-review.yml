name: Prepare JBI blinded classification review

on:
  pull_request:
    paths:
      - "build_jbi_blinded_classification_review.py"
      - "analysis_evidence_spatial_scale.py"
      - "data/resolved_inputs/global_flower_colour_review_queue_resolved.csv"
      - "docs/supporting/jbi_table_s6_frozen_classification_manifest.csv"
      - ".github/workflows/prepare-jbi-blinded-classification-review.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-review-packet:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jbi-final-editorial-revision
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tabular dependency
        run: python -m pip install --disable-pip-version-check pandas statsmodels numpy

      - name: Build blinded sheet and separate key
        run: |
          python build_jbi_blinded_classification_review.py
          test -s docs/supporting/jbi_table_s18_blinded_classification_review.csv
          test -s docs/supporting/jbi_table_s19_rule_classification_key.csv
          python - <<'PY'
          import csv
          from pathlib import Path
          root = Path("docs/supporting")
          with (root / "jbi_table_s18_blinded_classification_review.csv").open(newline="", encoding="utf-8") as handle:
              blind = list(csv.DictReader(handle))
          with (root / "jbi_table_s19_rule_classification_key.csv").open(newline="", encoding="utf-8") as handle:
              key = list(csv.DictReader(handle))
          assert len(blind) == 34
          assert len(key) == 34
          assert {row["review_id"] for row in blind} == {row["review_id"] for row in key}
          assert all(not row["reviewer_label"] for row in blind)
          assert "rule_label" not in blind[0]
          assert set(row["queue_review_status"] for row in key) == {"unreviewed"}
          print({
              "rows": len(blind),
              "source_match_counts": {
                  value: sum(row["source_match_status"] == value for row in blind)
                  for value in sorted({row["source_match_status"] for row in blind})
              },
          })
          PY

      - name: Commit review packet
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/supporting/jbi_table_s18_blinded_classification_review.csv \
            docs/supporting/jbi_table_s19_rule_classification_key.csv
          if git diff --cached --quiet; then
            echo "No classification-review packet changes"
            exit 0
          fi
          git commit -m "Prepare blinded baseline classification review packet"
          git push origin HEAD:agent/jbi-final-editorial-revision

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jbi-blinded-classification-review
          path: |
            docs/supporting/jbi_table_s18_blinded_classification_review.csv
            docs/supporting/jbi_table_s19_rule_classification_key.csv
          if-no-files-found: error
          retention-days: 14
