name: PR JBI phylogenetic sensitivity

on:
  pull_request:
    paths:
      - "analysis_phylogenetic_spatial_scale.R"
      - "analysis_climatic_niche_spatial_scale_robustness.py"
      - "docs/supporting/jbi_table_s8_baseline_model_dataset.csv"
      - "docs/supporting/jbi_table_s9_paginated_quality_filtered_model_dataset.csv"
      - ".github/workflows/pr-jbi-phylogenetic-sensitivity.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phylogenetic-sensitivity:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Prepare output directory
        run: mkdir -p analysis_outputs/jbi_phylogenetic_sensitivity

      - name: Install Python dependencies
        run: |
          python -m pip install --disable-pip-version-check numpy pandas statsmodels

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("ape","jsonlite","phylolm","rotl"), repos="https://cloud.r-project.org")'

      - name: Validate R script and package loading
        run: |
          set +e
          Rscript -e '
            parse(file="analysis_phylogenetic_spatial_scale.R")
            library(ape)
            library(jsonlite)
            library(phylolm)
            library(rotl)
            print(sessionInfo())
          ' > analysis_outputs/jbi_phylogenetic_sensitivity/r_diagnostic.log 2>&1
          status=$?
          cat analysis_outputs/jbi_phylogenetic_sensitivity/r_diagnostic.log
          exit $status

      - name: Reproduce paginated-sample robustness statistics
        run: |
          mkdir -p analysis_outputs/jbi_phylogenetic_sensitivity/paginated_robustness
          python analysis_climatic_niche_spatial_scale_robustness.py \
            --dataset docs/supporting/jbi_table_s9_paginated_quality_filtered_model_dataset.csv \
            --outdir analysis_outputs/jbi_phylogenetic_sensitivity/paginated_robustness \
            --permutations 9999 \
            --seed 20260719

      - name: Fit topology-based phylogenetic model to original sample
        run: |
          set +e
          mkdir -p analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_original
          Rscript analysis_phylogenetic_spatial_scale.R \
            --dataset docs/supporting/jbi_table_s8_baseline_model_dataset.csv \
            --outdir analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_original \
            --analysis_label baseline_original_occurrences \
            --replicates 100 \
            --seed 20260724 \
            --min_cells 20 \
            > analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_original/run.log 2>&1
          status=$?
          cat analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_original/run.log
          exit $status

      - name: Fit topology-based phylogenetic model to paginated sample
        run: |
          set +e
          mkdir -p analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_paginated
          Rscript analysis_phylogenetic_spatial_scale.R \
            --dataset docs/supporting/jbi_table_s9_paginated_quality_filtered_model_dataset.csv \
            --outdir analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_paginated \
            --analysis_label baseline_paginated_quality_filtered \
            --replicates 100 \
            --seed 20260824 \
            --min_cells 20 \
            > analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_paginated/run.log 2>&1
          status=$?
          cat analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_paginated/run.log
          exit $status

      - name: Validate outputs
        run: |
          set -euo pipefail
          test -s analysis_outputs/jbi_phylogenetic_sensitivity/paginated_robustness/climatic_niche_spatial_scale_robustness.csv
          test -s analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_original/phylogenetic_logistic_summary.csv
          test -s analysis_outputs/jbi_phylogenetic_sensitivity/phylogenetic_paginated/phylogenetic_logistic_summary.csv
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          root = Path("analysis_outputs/jbi_phylogenetic_sensitivity")
          robust = pd.read_csv(root / "paginated_robustness/climatic_niche_spatial_scale_robustness.csv")
          moisture = robust[
              (robust["analysis_set"] == "baseline_unambiguous_only") &
              (robust["metric"] == "moisture_breadth") &
              (robust["analysis_status"] == "complete")
          ]
          assert len(moisture) == 1, robust.to_dict("records")
          row = moisture.iloc[0]
          assert int(row["n_species"]) == 34, row.to_dict()
          assert int(row["permutations_valid"]) == 9999, row.to_dict()

          original = pd.read_csv(root / "phylogenetic_original/phylogenetic_logistic_summary.csv")
          paginated = pd.read_csv(root / "phylogenetic_paginated/phylogenetic_logistic_summary.csv")
          assert int(original.loc[0, "n_replicates_complete"]) >= 90, original.to_dict("records")
          assert int(paginated.loc[0, "n_replicates_complete"]) >= 90, paginated.to_dict("records")
          print({
              "paginated_moisture": row.to_dict(),
              "phylogenetic_original": original.to_dict("records"),
              "phylogenetic_paginated": paginated.to_dict("records"),
          })
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jbi-phylogenetic-sensitivity
          path: analysis_outputs/jbi_phylogenetic_sensitivity/
          if-no-files-found: error
          retention-days: 14
