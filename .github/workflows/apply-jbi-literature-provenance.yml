name: Apply JBI literature provenance patch

on:
  pull_request:
    paths:
      - "tools/apply_jbi_literature_provenance_patch.py"
      - "docs/jbi_literature_search_provenance.md"
      - ".github/workflows/apply-jbi-literature-provenance.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jbi-final-editorial-revision
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply and validate literature provenance patch
        run: |
          python tools/apply_jbi_literature_provenance_patch.py
          grep -q "from 16 to 19 July 2026" docs/jbi_manuscript_editorial_revision.md
          grep -q "Appendix S1" docs/jbi_manuscript_editorial_revision.md
          grep -q "independent duplicate screening" docs/jbi_manuscript_editorial_revision.md

      - name: Commit manuscript update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/jbi_manuscript_editorial_revision.md
          if git diff --cached --quiet; then
            echo "No manuscript change"
            exit 0
          fi
          git commit -m "Document literature search chronology in JBI manuscript"
          git push origin HEAD:agent/jbi-final-editorial-revision
