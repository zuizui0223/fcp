name: Apply JBI GBIF accessibility patch

on:
  pull_request:
    paths:
      - "tools/apply_jbi_gbif_accessibility_patch.py"
      - "docs/jbi_gbif_doi_protocol.md"
      - "docs/supporting/jbi_gbif_doi_bundle/**"
      - ".github/workflows/apply-jbi-gbif-accessibility.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/jbi-final-editorial-revision
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply and validate Data Accessibility patch
        run: |
          python tools/apply_jbi_gbif_accessibility_patch.py
          grep -q "58,455-row occurrence subset" docs/jbi_manuscript_editorial_revision.md
          grep -q "GBIF Derived Dataset DOI citations" docs/jbi_manuscript_editorial_revision.md
          grep -q "docs/jbi_gbif_doi_protocol.md" docs/jbi_manuscript_editorial_revision.md

      - name: Commit manuscript update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/jbi_manuscript_editorial_revision.md
          if git diff --cached --quiet; then
            echo "No manuscript change"
            exit 0
          fi
          git commit -m "Document exact GBIF citation bundle in manuscript"
          git push origin HEAD:agent/jbi-final-editorial-revision
